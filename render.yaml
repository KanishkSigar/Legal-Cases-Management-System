# Render Blueprint — provisions the database AND the web service, and wires them
# together automatically. Deploy via render.com → New → Blueprint → pick this repo.
databases:
  - name: caseharbor-db
    plan: free
    databaseName: caseharbor
    user: caseharbor

services:
  - type: web
    name: caseharbor
    runtime: python
    plan: free
    # Install deps, collect static files, and create the schema at build time.
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL          # auto-filled from the database above — no copying
        fromDatabase:
          name: caseharbor-db
          property: connectionString
      - key: SECRET_KEY            # auto-generated by Render
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.7"
