{% extends 'base.html' %}
{% block title %}Confirm delete — CaseHarbor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-danger"><div class="card-body">
      <h4 class="text-danger">Confirm delete</h4>
      <p>Are you sure you want to delete <strong>{{ object }}</strong>?
         This also removes their login account and cannot be undone.</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
