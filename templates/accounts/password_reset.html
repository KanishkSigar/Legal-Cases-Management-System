{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Reset password — CaseHarbor{% endblock %}
{% block content %}
<div class="auth-screen">
  <div class="auth-card">
    <a href="{% url 'landing' %}" class="auth-brand"><i class="bi bi-bank2"></i> Case<span>Harbor</span></a>
    <h4>Forgot your password?</h4>
    <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-dark w-100 mt-2">Send reset link</button>
    </form>
    <div class="auth-foot"><a href="{% url 'login' %}">← Back to sign in</a></div>
  </div>
</div>
{% endblock %}
