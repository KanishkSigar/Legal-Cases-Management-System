{% extends 'base.html' %}
{% block title %}Password reset — CaseHarbor{% endblock %}
{% block content %}
<div class="auth-screen">
  <div class="auth-card text-center">
    <div class="auth-badge mx-auto"><i class="bi bi-check-circle"></i></div>
    <h4>Password updated</h4>
    <p class="auth-sub">Your password has been changed. You can now sign in with it.</p>
    <a href="{% url 'login' %}" class="btn btn-dark w-100">Sign in</a>
  </div>
</div>
{% endblock %}
