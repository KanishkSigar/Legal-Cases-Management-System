{% extends 'base.html' %}
{% block title %}Check your email — CaseHarbor{% endblock %}
{% block content %}
<div class="auth-screen">
  <div class="auth-card text-center">
    <div class="auth-badge mx-auto"><i class="bi bi-envelope-check"></i></div>
    <h4>Check your email</h4>
    <p class="auth-sub">If an account exists for that address, we've sent a link to reset your password. The link expires shortly.</p>
    <a href="{% url 'login' %}" class="btn btn-dark w-100">Back to sign in</a>
  </div>
</div>
{% endblock %}
