{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }} — Legal CMS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h3 class="mb-3">{{ title }}</h3>
    <div class="card"><div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Save</button>
          <a href="{% url 'case_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
